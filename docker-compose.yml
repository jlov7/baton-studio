services:
  backend:
    build:
      context: ./backend
    environment:
      BATON_ENV: ${BATON_ENV:-production}
      BATON_API_KEY: ${BATON_API_KEY:-}
      BATON_API_KEYS: ${BATON_API_KEYS:-}
      BATON_CORS_ORIGINS: ${BATON_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      BATON_DATABASE_URL: ${BATON_DATABASE_URL:-sqlite+aiosqlite:////data/baton.sqlite}
    ports:
      - "8787:8787"
    volumes:
      - baton-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/ready').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8787}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8787}
        NEXT_PUBLIC_BATON_API_KEY: ${NEXT_PUBLIC_BATON_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  baton-data:
