<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#070a12"/>
    </linearGradient>
    <style>
      .box { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.18); stroke-width: 2; rx: 16; }
      .title { fill: #ffffff; font-family: ui-sans-serif, system-ui; font-size: 24px; font-weight: 700; }
      .txt { fill: rgba(255,255,255,0.78); font-family: ui-sans-serif, system-ui; font-size: 16px; }
      .small { fill: rgba(255,255,255,0.65); font-family: ui-sans-serif, system-ui; font-size: 14px; }
      .arrow { stroke: rgba(255,255,255,0.55); stroke-width: 3; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 z" fill="rgba(255,255,255,0.55)"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <text x="60" y="70" class="title">Baton Studio — Substrate-native Multi-Agent Coordination</text>

  <!-- UI -->
  <rect x="70" y="120" width="420" height="200" class="box"/>
  <text x="95" y="165" class="title" style="font-size:20px;">Control Room UI (Next.js)</text>
  <text x="95" y="195" class="txt">Mission HUD · World Model · Causal Graph</text>
  <text x="95" y="220" class="txt">Timeline replay · Export packs</text>
  <text x="95" y="245" class="small">HTTP snapshots + WebSocket events</text>

  <!-- Backend -->
  <rect x="70" y="380" width="420" height="250" class="box"/>
  <text x="95" y="425" class="title" style="font-size:20px;">Substrate Server (FastAPI)</text>
  <text x="95" y="455" class="txt">Shared World Model (typed + invariants)</text>
  <text x="95" y="480" class="txt">Shared Causal Graph (provenance + deps)</text>
  <text x="95" y="505" class="txt">Energy Pool + Baton Arbitration</text>
  <text x="95" y="530" class="txt">Append-only Event Log</text>
  <text x="95" y="560" class="small">SQLite · deterministic demo simulator</text>

  <!-- Storage -->
  <rect x="540" y="440" width="260" height="190" class="box"/>
  <text x="565" y="485" class="title" style="font-size:20px;">SQLite</text>
  <text x="565" y="515" class="txt">Entities + versions</text>
  <text x="565" y="540" class="txt">Causal nodes/edges</text>
  <text x="565" y="565" class="txt">Energy + baton</text>
  <text x="565" y="590" class="txt">Events (NDJSON export)</text>

  <!-- MCP -->
  <rect x="850" y="120" width="300" height="220" class="box"/>
  <text x="875" y="165" class="title" style="font-size:20px;">MCP Server</text>
  <text x="875" y="195" class="txt">Tools:</text>
  <text x="900" y="220" class="small">baton.read_world · propose_patch</text>
  <text x="900" y="245" class="small">claim_baton · commit_patch</text>
  <text x="900" y="270" class="small">add_causal_edge · energy_spend</text>
  <text x="875" y="300" class="small">stdio (local) or HTTP (remote)</text>

  <!-- Agents -->
  <rect x="850" y="400" width="300" height="230" class="box"/>
  <text x="875" y="445" class="title" style="font-size:20px;">Agents</text>
  <text x="875" y="475" class="txt">Claude Code agent teams</text>
  <text x="875" y="500" class="txt">or simulated demo agents</text>
  <text x="875" y="530" class="small">Agents coordinate via substrate operations</text>
  <text x="875" y="555" class="small">(not just text messages)</text>

  <!-- arrows -->
  <line x1="280" y1="320" x2="280" y2="380" class="arrow"/>
  <line x1="490" y1="505" x2="540" y2="505" class="arrow"/>
  <line x1="490" y1="210" x2="850" y2="210" class="arrow"/>
  <line x1="1000" y1="340" x2="1000" y2="400" class="arrow"/>
  <line x1="850" y1="505" x2="490" y2="505" class="arrow"/>

</svg>
